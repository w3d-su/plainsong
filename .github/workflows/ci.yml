name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install xcodegen swiftformat swiftlint

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install preview dependencies
        run: |
          cd preview-src
          npm ci

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Build app
        run: make build
