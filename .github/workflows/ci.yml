name: CI

# No push trigger: main is protected and only receives squash merges of
# PR-validated commits, so a push build duplicates the PR build at 10x
# private-repo macOS pricing (this exhausted the June 2026 Actions quota).
# Use workflow_dispatch to verify main on demand.
on:
  pull_request:
  workflow_dispatch:

# Private-repo macOS minutes are expensive (10x multiplier): never run two
# builds for the same ref at once.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: |
          brew install xcodegen swiftformat swiftlint
          echo "xcodegen: $(xcodegen --version)"
          echo "swiftformat: $(swiftformat --version)"
          echo "swiftlint: $(swiftlint --version)"

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: preview-src/package-lock.json

      - name: Cache Swift package builds
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            Packages/MarkdownCore/.build
            Packages/EditorKit/.build
            Packages/PreviewKit/.build
            Packages/WorkspaceKit/.build
          key: spm-${{ runner.os }}-${{ hashFiles('Packages/**/Package.swift', 'Packages/**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Install preview dependencies
        run: |
          cd preview-src
          npm ci

      - name: Typecheck preview
        run: cd preview-src && npm run typecheck

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Build app
        run: make build
