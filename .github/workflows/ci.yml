name: CI

on:
  push:
    branches: [main]
    paths-ignore:
      - "agent.md"
      - "README.md"
      - "LICENSE"
  pull_request:
  workflow_dispatch:

# Private-repo macOS minutes are expensive (10x multiplier): never run two
# builds for the same ref at once.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: macos-15
    timeout-minutes: 40
    steps:
      - uses: actions/checkout@v4

      - name: Install tools
        run: brew install xcodegen swiftformat swiftlint

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: preview-src/package-lock.json

      - name: Cache Swift package builds
        uses: actions/cache@v4
        with:
          path: |
            ~/Library/Caches/org.swift.swiftpm
            Packages/MarkdownCore/.build
            Packages/EditorKit/.build
            Packages/PreviewKit/.build
            Packages/WorkspaceKit/.build
          key: spm-${{ runner.os }}-${{ hashFiles('Packages/**/Package.swift', 'Packages/**/Package.resolved') }}
          restore-keys: spm-${{ runner.os }}-

      - name: Install preview dependencies
        run: |
          cd preview-src
          npm ci

      - name: Lint
        run: make lint

      - name: Test
        run: make test

      - name: Build app
        run: make build
